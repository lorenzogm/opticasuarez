name: Web [Vercel] Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    name: Check for changes
    outputs:
      infra-changed: ${{ steps.check.outputs.infra-changed }}
      app-changed: ${{ steps.check.outputs.app-changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infra-changed=true" >> $GITHUB_OUTPUT
            echo "app-changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — deploying everything"
            exit 0
          fi

          if git diff --name-only HEAD~1 -- infra/vercel/ | grep -q .; then
            echo "infra-changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in infra/vercel/"
          else
            echo "infra-changed=false" >> $GITHUB_OUTPUT
            echo "No changes in infra/vercel/"
          fi

          if git diff --name-only HEAD~1 -- apps/web/ | grep -q .; then
            echo "app-changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in apps/web/"
          else
            echo "app-changed=false" >> $GITHUB_OUTPUT
            echo "No changes in apps/web/"
          fi

  infra-deploy:
    needs: check-changes
    if: needs.check-changes.outputs.infra-changed == 'true'
    runs-on: ubuntu-latest
    name: Infrastructure Deploy
    environment: development
    outputs:
      project-id: ${{ steps.export-outputs.outputs.project-id }}
    env:
      TF_VAR_ENVIRONMENT: development
      TF_VAR_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TF_VAR_VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Terraform State from state branch
        working-directory: infra/vercel/src
        run: |
          STATE_FILE="terraform-${{ env.TF_VAR_ENVIRONMENT }}.tfstate.enc"
          if git fetch origin terraform-state 2>/dev/null; then
            if git show "origin/terraform-state:infra/vercel/src/${STATE_FILE}" > "$STATE_FILE" 2>/dev/null; then
              echo "State file fetched from terraform-state branch"
            else
              echo "State file not found on terraform-state branch"
            fi
          else
            echo "terraform-state branch does not exist yet"
          fi

      - name: Decrypt Terraform State
        working-directory: infra/vercel/src
        run: |
          STATE_FILE="terraform-${{ env.TF_VAR_ENVIRONMENT }}.tfstate.enc"
          if [ -f "$STATE_FILE" ]; then
            echo "${{ secrets.TERRAFORM_STATE_ENCRYPT_KEY }}" | openssl enc -aes-256-cbc -d -in "$STATE_FILE" -out "terraform.tfstate" -pass stdin
            echo "State file decrypted"
          else
            echo "No existing state file found"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/vercel/src
        run: terraform init

      - name: Import existing project if state is missing
        working-directory: infra/vercel/src
        continue-on-error: true
        run: |
          if [ ! -f "terraform.tfstate" ] || [ "$(jq '.resources | length' terraform.tfstate 2>/dev/null)" = "0" ]; then
            ENV_SHORT=$(echo "${{ env.TF_VAR_ENVIRONMENT }}" | cut -c1-3)
            PROJECT_NAME="opticasuarez-web-${ENV_SHORT}"
            echo "No state found. Checking for existing project: $PROJECT_NAME"
            TEAM_PARAM=""
            if [ -n "${TF_VAR_VERCEL_ORG_ID}" ]; then
              TEAM_PARAM="?teamId=${TF_VAR_VERCEL_ORG_ID}"
            fi
            PROJECT_ID=$(curl -sf -H "Authorization: Bearer ${TF_VAR_VERCEL_TOKEN}" "https://api.vercel.com/v9/projects/${PROJECT_NAME}${TEAM_PARAM}" | jq -r '.id // empty')
            if [ -n "$PROJECT_ID" ]; then
              echo "Found existing project $PROJECT_ID — importing into state"
              terraform import -var-file="config.${{ env.TF_VAR_ENVIRONMENT }}.json" vercel_project.main "$PROJECT_ID"
            else
              echo "No existing project found, proceeding with fresh creation"
            fi
          fi

      - name: Terraform Plan
        working-directory: infra/vercel/src
        run: terraform plan -var-file="config.${{ env.TF_VAR_ENVIRONMENT }}.json" -out=tfplan

      - name: Terraform Apply
        working-directory: infra/vercel/src
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        id: export-outputs
        working-directory: infra/vercel/src
        run: |
          PROJECT_ID=$(terraform output -raw OPTICASUAREZ_WEB_VERCEL_PROJECT_ID)
          echo "Vercel Project ID: $PROJECT_ID"
          echo "project-id=$PROJECT_ID" >> $GITHUB_OUTPUT
          if [ -n "${{ secrets.GH_BOT_TOKEN }}" ]; then
            gh variable set OPTICASUAREZ_WEB_VERCEL_PROJECT_ID --body "$PROJECT_ID"
            echo "GitHub variable set successfully"
          else
            echo "GH_BOT_TOKEN not configured — set OPTICASUAREZ_WEB_VERCEL_PROJECT_ID variable manually to: $PROJECT_ID"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}

      - name: Encrypt Terraform State
        working-directory: infra/vercel/src
        run: |
          if [ -f "terraform.tfstate" ]; then
            echo "${{ secrets.TERRAFORM_STATE_ENCRYPT_KEY }}" | openssl enc -aes-256-cbc -in "terraform.tfstate" -out "terraform-${{ env.TF_VAR_ENVIRONMENT }}.tfstate.enc" -pass stdin
            rm -f terraform.tfstate
            echo "State file encrypted successfully"
          else
            echo "Error: No terraform.tfstate file found to encrypt"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit Encrypted State to state branch
        working-directory: infra/vercel/src
        run: |
          STATE_FILE="terraform-${{ env.TF_VAR_ENVIRONMENT }}.tfstate.enc"
          cp "$STATE_FILE" "/tmp/$STATE_FILE"

          cd ${{ github.workspace }}
          if git fetch origin terraform-state 2>/dev/null; then
            git checkout terraform-state
          else
            git checkout --orphan terraform-state
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p infra/vercel/src
          cp "/tmp/$STATE_FILE" "infra/vercel/src/$STATE_FILE"
          git add "infra/vercel/src/$STATE_FILE"
          git diff --staged --quiet && echo "No changes to state file" && exit 0
          git commit -m "chore: update terraform state for ${{ env.TF_VAR_ENVIRONMENT }} environment"
          git push origin terraform-state
          echo "State file committed to terraform-state branch"

  app-deploy:
    needs: [check-changes, infra-deploy]
    if: |
      always() &&
      needs.infra-deploy.result != 'failure' &&
      (needs.check-changes.outputs.app-changed == 'true' || needs.check-changes.outputs.infra-changed == 'true')
    runs-on: ubuntu-latest
    name: App Deploy
    environment: development
    env:
      VERCEL_PROJECT_ID: ${{ needs.infra-deploy.outputs.project-id || vars.OPTICASUAREZ_WEB_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Vercel Org ID
        id: resolve-org
        run: |
          ORG_ID="${{ secrets.VERCEL_ORG_ID }}"
          if [ -z "$ORG_ID" ]; then
            echo "VERCEL_ORG_ID secret is empty — resolving from Vercel API (personal account)"
            ORG_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" "https://api.vercel.com/v2/user" | jq -r '.user.id')
            echo "Resolved org ID: $ORG_ID"
          fi
          echo "org-id=$ORG_ID" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ steps.resolve-org.outputs.org-id }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ steps.resolve-org.outputs.org-id }}
          NITRO_PRESET: vercel

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deploy URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ steps.resolve-org.outputs.org-id }}

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: pnpm --filter opticasuarez-web-e2e test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deploy-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: true
