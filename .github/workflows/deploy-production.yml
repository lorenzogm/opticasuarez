name: Deploy to Production

# DISABLED: React Router app is no longer updated.
# Replaced by web-vercel-deploy.yml which deploys apps/web (TanStack Start).
# on:
#   push:
#     branches: [main]
on: workflow_dispatch

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Vercel Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel Production
        working-directory: apps/opticasuarez-react-router
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
