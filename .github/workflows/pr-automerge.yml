name: PR Auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable Auto-merge
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const { repository } = await github.graphql(
              `
                query($owner: String!, $repo: String!, $pullNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      id
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `,
              {
                owner,
                repo,
                pullNumber,
              }
            );

            const pullRequest = repository.pullRequest;

            if (!pullRequest) {
              core.setFailed(`Could not load PR #${pullNumber}`);
              return;
            }

            if (pullRequest.autoMergeRequest) {
              core.info(`Auto-merge is already enabled for PR #${pullNumber}`);
              return;
            }

            await github.graphql(
              `
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: SQUASH
                    }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }
              `,
              {
                pullRequestId: pullRequest.id,
              }
            );

            core.info(`Enabled auto-merge for PR #${pullNumber}`);