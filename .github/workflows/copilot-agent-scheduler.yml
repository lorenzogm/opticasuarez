# Copilot Agent Scheduler
#
# Runs daily and on manual trigger to:
#   1. Assign Copilot to open issues (so it creates branches and PRs)
#   2. Nudge Copilot on PRs with merge conflicts or pending review comments
#   3. Request reviews from juanpeich and lorenzogm on Copilot PRs
#
# Prerequisites:
#   - GitHub Copilot coding agent must be enabled in repo Settings > Copilot > Coding agent
#   - Recommended: set branch protection on `main` to require approving reviews
#     from juanpeich and/or lorenzogm before merging

name: Copilot Agent Scheduler

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8:00 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ── Assign Copilot to open, unassigned issues ──────────────────────────
  assign-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to open issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const issue of issues) {
              // The issues endpoint also returns PRs — skip them
              if (issue.pull_request) continue;

              // Skip issues that already have any assignee
              if (issue.assignees && issue.assignees.length > 0) continue;

              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['copilot'],
                });
                core.info(`✅ Assigned Copilot to issue #${issue.number}: ${issue.title}`);
              } catch (err) {
                core.warning(`⚠️ Could not assign Copilot to #${issue.number}: ${err.message}`);
              }
            }

  # ── Process open PRs: resolve conflicts, address comments, request reviews ─
  process-pull-requests:
    runs-on: ubuntu-latest
    steps:
      - name: Process PRs needing attention
        uses: actions/github-script@v7
        with:
          script: |
            const REQUIRED_REVIEWERS = ['juanpeich', 'lorenzogm'];
            const MARKER = '<!-- copilot-scheduler -->';

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of prs) {
              const prNumber = pr.number;

              // ── Fetch recent comments to prevent duplicate nudges ──
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 20,
              });
              const recentSchedulerComment = comments.some(
                (c) =>
                  c.body.includes(MARKER) &&
                  Date.now() - new Date(c.created_at).getTime() < 24 * 60 * 60 * 1000
              );
              if (recentSchedulerComment) {
                core.info(`⏭️ PR #${prNumber} already nudged in the last 24 h — skipping`);
                continue;
              }

              // ── Detailed PR info (mergeable status) ──
              const { data: prDetail } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              // ── Merge conflicts ──
              if (prDetail.mergeable === false) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: [
                    MARKER,
                    '@copilot This PR has merge conflicts. Please rebase on the latest `main` branch and resolve them.',
                  ].join('\n'),
                });
                core.info(`🔀 Requested conflict resolution on PR #${prNumber}`);
              }

              // ── Review comments requesting changes ──
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const changesRequested = reviews.some(
                (r) => r.state === 'CHANGES_REQUESTED'
              );
              if (changesRequested) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: [
                    MARKER,
                    '@copilot There are review comments requesting changes. Please address all feedback from the reviewers.',
                  ].join('\n'),
                });
                core.info(`💬 Requested review feedback on PR #${prNumber}`);
              }

              // ── Ensure required reviewers are requested ──
              try {
                const { data: reviewRequests } =
                  await github.rest.pulls.listRequestedReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                  });

                const alreadyRequested = reviewRequests.users.map((u) => u.login);
                const alreadyReviewed = reviews.map((r) => r.user.login);
                const needToRequest = REQUIRED_REVIEWERS.filter(
                  (r) => !alreadyRequested.includes(r) && !alreadyReviewed.includes(r)
                );

                if (needToRequest.length > 0) {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    reviewers: needToRequest,
                  });
                  core.info(
                    `👀 Requested review from ${needToRequest.join(', ')} on PR #${prNumber}`
                  );
                }
              } catch (err) {
                core.warning(
                  `⚠️ Could not request reviewers on PR #${prNumber}: ${err.message}`
                );
              }
            }
