name: Issue-to-Green

# Assigns the Copilot Cloud Agent to new issues with TDD instructions.
# Copilot creates a branch and PR. Other workflows handle:
#   - pr-checks.yml        → pnpm check + build
#   - web-vercel-deploy.yml → preview URL on PR
#   - pr-automerge.yml      → auto-merge after approval
#
# Requirements:
#   - Copilot Cloud Agent enabled in repo Settings → Copilot → Cloud agent
#   - GH_PAT secret: a Personal Access Token with repo scope (needed for agent assignment API)

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to assign to Copilot"
        required: true
        type: number

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-to-green-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.issue.user.type != 'Bot'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - name: Assign Copilot Cloud Agent with TDD instructions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          FULL_REPO="${{ github.repository }}"
          TDD_INSTRUCTIONS="Use the /tdd skill. Follow TDD (Test-Driven Development) with red-green-refactor. Write ONE test for first behavior, make it pass with minimal code, then repeat for each behavior. Vertical slices only — never write all tests first. Tests verify behavior through public interfaces, not implementation details. Run pnpm check to validate before pushing. Follow kebab-case file naming, PascalCase for React components. When finished, request review from juanpeich. Assign the PR to juanpeich."

          echo "Assigning Copilot Cloud Agent to issue #${ISSUE_NUMBER}..."

          # Replace all assignees with only Copilot (removes lorenzogm or others)
          PAYLOAD=$(jq -n \
            --arg repo "$FULL_REPO" \
            --arg instructions "$TDD_INSTRUCTIONS" \
            '{
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: $instructions,
                custom_agent: "",
                model: ""
              }
            }')

          RESPONSE=$(echo "$PAYLOAD" | gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${FULL_REPO}/issues/${ISSUE_NUMBER}" \
            --input -)

          COPILOT_ASSIGNED=$(echo "$RESPONSE" | jq -r '.assignees[]? | select(.login == "Copilot") | .login')
          if [ "$COPILOT_ASSIGNED" = "Copilot" ]; then
            echo "✅ Copilot Cloud Agent assigned to issue #${ISSUE_NUMBER}"
          else
            echo "❌ Failed to assign Copilot Cloud Agent"
            echo "Response assignees: $(echo "$RESPONSE" | jq -r '[.assignees[].login] | join(", ")')"
            exit 1
          fi
