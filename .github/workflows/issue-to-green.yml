name: Issue-to-Green

# Assigns the Copilot Coding Agent to new issues with TDD instructions.
# Copilot creates a branch and PR. Other workflows handle:
#   - pr-checks.yml        → pnpm check + build
#   - web-vercel-deploy.yml → preview URL on PR
#   - pr-automerge.yml      → auto-merge after approval

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to assign to Copilot"
        required: true
        type: number

permissions:
  issues: write

concurrency:
  group: issue-to-green-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.issue.user.type != 'Bot'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - name: Assign Copilot with TDD instructions
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);

            if (!issueNumber) {
              core.setFailed('No issue number provided');
              return;
            }

            // Assign copilot to the issue
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: ['copilot'],
              });
              core.info(`Assigned Copilot to issue #${issueNumber}`);
            } catch (err) {
              core.warning(`Could not assign Copilot: ${err.message}`);
            }

            // Add TDD instruction comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'Implement this issue following **TDD (Test-Driven Development)** using the `/tdd` skill.',
                '',
                '### Workflow',
                '1. **Plan**: Read the issue, explore the codebase, identify behaviors to test and public interfaces',
                '2. **Tracer bullet**: Write ONE test for first behavior → minimal code to pass',
                '3. **Incremental loop**: Next behavior → write test → make it pass → repeat',
                '4. **Refactor**: Only after all tests pass, clean up',
                '',
                '### Rules',
                '- Vertical slices only — one test → one implementation at a time (never write all tests first)',
                '- Tests verify behavior through public interfaces, not implementation details',
                '- Run `pnpm check` to validate before pushing',
                '- Follow kebab-case file naming, PascalCase for components',
                '- Request reviews from `juanpeich` and `lorenzogm`',
              ].join('\n'),
            });

            core.info(`Added TDD instructions to issue #${issueNumber}`);
